#cloud-config

# =============================================================================
# RetroMultiCiv — Hetzner cloud-init template (CX22/CX23 or similar; 4 GB recommended)
# =============================================================================
# Hosts BOTH roles on one box (docs/12) under ONE domain:
#   https://<YOUR_DOMAIN>/           -> game server  (client + /ws WebSocket, :8123)
#   https://<YOUR_DOMAIN>/master/    -> master index (server list,          :8200)
# Sanitised example — to use it:
#   1. Copy to cloud-init.yaml (gitignored — keep your filled-in copy private)
#   2. Replace every <PLACEHOLDER>:
#        <DEPLOY_USER>          — your server username
#        <YOUR_PUBLIC_SSH_KEY>  — output of: cat ~/.ssh/id_ed25519.pub
#        <YOUR_DOMAIN>          — e.g. multiciv.example.com
#        <SERVER_NAME>          — public listing name, e.g. "Kjell's Friday server"
#        <YOUR_EMAIL>           — Let's Encrypt registration email
#   3. Paste into the Hetzner console when creating the server
#
# After first login (ssh -p 2222 <DEPLOY_USER>@<ip>):
#   1. Copy code:  scp -P 2222 -r . <DEPLOY_USER>@<ip>:/opt/retromulticiv/
#      (No .env / no DB — RetroMultiCiv is stateless config-via-flags + file saves.)
#   2. Point DNS: A record for <YOUR_DOMAIN> -> <ip>
#   3. Run:       ~/first-deploy.sh
# =============================================================================

users:
  - name: <DEPLOY_USER>
    groups: users, admin
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - <YOUR_PUBLIC_SSH_KEY>

packages:
  - fail2ban
  - ufw
  - nginx
  - certbot
  - python3-certbot-nginx
package_update: true
package_upgrade: true

write_files:

  # ── SSH hardening ────────────────────────────────────────────────────────
  - path: /etc/ssh/sshd_config.d/ssh-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      Port 2222
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      MaxAuthTries 2
      AllowTcpForwarding no
      X11Forwarding no
      AllowAgentForwarding no
      AuthorizedKeysFile .ssh/authorized_keys
      AllowUsers <DEPLOY_USER>

  # ── nginx — one domain, two upstreams. The GAME (root) needs the WebSocket
  #    /ws upgrade (Upgrade/Connection + HTTP/1.1 + long timeout) — this is the
  #    key difference from a plain web app. The MASTER lives under /master/
  #    (trailing slash on proxy_pass strips the prefix, so the service sees
  #    /announce + /servers). certbot adds the HTTPS block automatically. ──────
  - path: /etc/nginx/sites-available/retromulticiv
    content: |
      server {
          listen 80;
          server_name <YOUR_DOMAIN>;

          # HSTS — force HTTPS for a year (covers both game + master). certbot
          # rewrites this block for :443; the header carries over.
          add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

          # Master index (bulletin board) — plain HTTP, prefix stripped to :8200
          location /master/ {
              proxy_pass       http://127.0.0.1:8200/;
              proxy_set_header Host              $host;
              proxy_set_header X-Real-IP         $remote_addr;
              proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          # Game server (client HTTP + /ws WebSocket) at root, on :8123
          location / {
              proxy_pass         http://127.0.0.1:8123;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade           $http_upgrade;
              proxy_set_header   Connection        "upgrade";
              proxy_set_header   Host              $host;
              proxy_set_header   X-Real-IP         $remote_addr;
              proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 3600s;   # long-lived WebSocket
              proxy_send_timeout 3600s;
          }
      }

  # ── systemd: MASTER index (bulletin board, ~100 MB). Started first so the
  #    game can announce to it. ────────────────────────────────────────────────
  - path: /etc/systemd/system/retromulticiv-master.service
    content: |
      [Unit]
      Description=RetroMultiCiv master index
      After=network.target

      [Service]
      Type=simple
      User=<DEPLOY_USER>
      WorkingDirectory=/opt/retromulticiv
      # --host 127.0.0.1: nginx proxies /master/ to it on loopback, so the index
      # never needs a public interface — defense-in-depth if ufw is ever flushed.
      ExecStart=/usr/bin/node tools/master.js --port 8200 --host 127.0.0.1
      NoNewPrivileges=yes
      ProtectSystem=strict
      ProtectHome=yes
      PrivateTmp=yes
      ProtectControlGroups=yes
      ProtectKernelTunables=yes
      ProtectKernelModules=yes
      RestrictAddressFamilies=AF_INET AF_INET6
      RestrictNamespaces=yes
      LockPersonality=yes
      MemoryMax=256M
      Restart=on-failure
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  # ── systemd: GAME server. Restart=on-failure leverages the crash-resilience
  #    exit-70 (crash/OOM) vs exit-0 (clean stop). Resource caps + OOM watchdog
  #    keep a small box safe. --public-addr is the PUBLIC url the master probes
  #    (NOT 127.0.0.1 — the master refuses loopback). Tune caps to your box. ────
  - path: /etc/systemd/system/retromulticiv-game.service
    content: |
      [Unit]
      Description=RetroMultiCiv game server
      After=network.target retromulticiv-master.service

      [Service]
      Type=simple
      User=<DEPLOY_USER>
      WorkingDirectory=/opt/retromulticiv
      # Resource caps: --max-turns/--max-civs/--max-size REQUIRE the operator-caps
      # code (A101) in your DEPLOYED tree. If your deployed code predates A101,
      # node exits 1 -> crash-loop — remove these three lines until it's in. Once
      # the warn-not-fail rider merges, unknown flags only WARN (no hard fail).
      # Tune the values to your box.
      ExecStart=/usr/bin/node server/index.js \
        --host 127.0.0.1 --port 8123 \
        --trust-proxy-hops 1 --origin-allowlist https://<YOUR_DOMAIN> \
        --public-addr https://<YOUR_DOMAIN> \
        --announce http://127.0.0.1:8200 --public-name "<SERVER_NAME>" \
        --max-games 8 --max-saves-mb 500 \
        --max-turns 500 --max-civs 8 --max-size large \
        --mem-soft-pct 85 --mem-check-sec 15
      NoNewPrivileges=yes
      ProtectSystem=strict
      ProtectHome=yes
      PrivateTmp=yes
      ProtectControlGroups=yes
      ProtectKernelTunables=yes
      ProtectKernelModules=yes
      RestrictAddressFamilies=AF_INET AF_INET6
      RestrictNamespaces=yes
      LockPersonality=yes
      ReadWritePaths=/opt/retromulticiv/saves /opt/retromulticiv/crashdumps
      MemoryMax=2G
      Restart=on-failure
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  # ── first-deploy helper — run once after uploading code ───────────────────
  - path: /home/<DEPLOY_USER>/first-deploy.sh
    owner: <DEPLOY_USER>:<DEPLOY_USER>
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      APP=/opt/retromulticiv

      echo "==> Installing dependencies (ws only; no build step)"
      cd "$APP"
      npm ci --omit=dev 2>/dev/null || npm install --omit=dev

      echo "==> Ensuring save + crashdump dirs"
      mkdir -p "$APP/saves" "$APP/crashdumps"

      echo "==> Starting services (master first, then game announces to it)"
      sudo systemctl daemon-reload
      sudo systemctl enable --now retromulticiv-master
      sudo systemctl enable --now retromulticiv-game

      echo "==> Obtaining TLS certificate"
      sudo certbot --nginx -d <YOUR_DOMAIN> \
        --non-interactive --agree-tos -m <YOUR_EMAIL>

      sudo systemctl reload nginx

      echo ""
      echo "RetroMultiCiv game:   https://<YOUR_DOMAIN>/client/?server=1"
      echo "RetroMultiCiv master: https://<YOUR_DOMAIN>/master/servers"
      echo "Logs: journalctl -u retromulticiv-game -f   (or -u retromulticiv-master)"
      echo "Crash/OOM dumps land in $APP/crashdumps/"

  # ── daily save backup (03:00) — games are FILES in saves/, not a DB. ───────
  - path: /etc/cron.d/retromulticiv-backup
    content: |
      0 3 * * * <DEPLOY_USER> mkdir -p /home/<DEPLOY_USER>/backups && tar czf /home/<DEPLOY_USER>/backups/saves-$(date +\%F).tar.gz -C /opt/retromulticiv saves && find /home/<DEPLOY_USER>/backups -name 'saves-*.tar.gz' -mtime +30 -delete

runcmd:
  # Node.js 22 LTS via NodeSource
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs

  # App directory — code uploaded by user after boot
  - mkdir -p /opt/retromulticiv/saves /opt/retromulticiv/crashdumps
  - chown -R <DEPLOY_USER>:<DEPLOY_USER> /opt/retromulticiv

  # fail2ban — SSH brute-force protection
  - printf "[sshd]\nenabled = true\nport = ssh, 2222\nbanaction = iptables-multiport" > /etc/fail2ban/jail.local
  - systemctl enable fail2ban

  # Ensure sshd is listening on 2222 BEFORE ufw closes 22 (avoids a lockout window)
  - systemctl restart ssh

  # Host firewall (ufw) — ONLY SSH + HTTP/HTTPS. 8123 (game) and 8200 (master)
  # stay localhost-behind-nginx and are NEVER opened. WebSocket rides 443.
  # NOTE: the HETZNER CLOUD FIREWALL must also allow 2222 inbound; keep the
  # Hetzner web console / rescue mode handy for the first login.
  - ufw allow 2222/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # nginx — activate the site, remove default placeholder
  - ln -s /etc/nginx/sites-available/retromulticiv /etc/nginx/sites-enabled/retromulticiv
  - rm -f /etc/nginx/sites-enabled/default
  - systemctl enable nginx

  - systemctl daemon-reload

  # Reboot: applies kernel updates, new SSH config, starts fail2ban
  - reboot
