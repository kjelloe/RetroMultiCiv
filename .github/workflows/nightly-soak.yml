# Nightly wide-net simulation soak (docs/05-simulation-test.md §6):
# the per-commit suite runs one golden seed; this sweeps 25 seeds under the
# two stress configurations that don't fit the suite budget. npm ci installs
# the single runtime dependency (ws, for the phase-3 server tests); the
# browser e2e self-skips without the Playwright cache.
name: nightly-soak

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install lune (Luau twin gates — test/luau-twins self-skips without it)
        run: |
          curl -fsSL -o /tmp/lune.zip https://github.com/lune-org/lune/releases/download/v0.10.5/lune-0.10.5-linux-x86_64.zip
          unzip -o /tmp/lune.zip -d /tmp/lune-bin
          chmod +x /tmp/lune-bin/lune
          echo /tmp/lune-bin >> "$GITHUB_PATH"
      - name: Install headless chromium (browser UI cases self-skip without it — user-approved tier 1, 2026-07-14)
        run: npx --yes playwright install --with-deps chromium-headless-shell
      - name: Full test suite (incl. golden-seed simulation + Luau anchor gates)
        run: node --test test/
      - name: Visual-regression goldens (A48 — byte-compare rest-pose shots)
        if: ${{ !cancelled() }}
        run: debugging/visual-check.sh
      - name: Upload visual diffs (actual + golden) on mismatch
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-goldens
          path: debugging/goldens/
          if-no-files-found: ignore

  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: God-Emperor soak — 25 seeds, 400 turns under contentCitizens 2
        run: node tools/soak.js --seeds 25 --turns 400 --size small --difficulty godemperor --stats debugging/sim/nightly-godemperor.jsonl
      - name: Natural-rules soak — 25 seeds must each produce a winner
        if: ${{ !cancelled() }}
        # 400, not 320: the Civ-style calendar (A21) puts 2100 AD — where the
        # score victory fires — at ~turn 395; a shorter budget strands natural
        # games in the 1800s with no winner (the 2026-07-14 24/25 failure).
        run: node tools/soak.js --seeds 25 --turns 400 --size small --natural --stats debugging/sim/nightly-natural.jsonl
      - name: Upload telemetry + failure artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sim
          path: debugging/sim/
          if-no-files-found: ignore

  canonical-floors:
    # The user-pinned M-target FLOORS (docs/05 §12) are defined on the CANONICAL
    # config — 7-civ medium no-chaos normal — which the two soak lanes above do
    # NOT run (they are small + godemperor/natural). This lane runs it and
    # tools/soak.js --stats prints the floor table (A93).
    #
    # RATCHET ENFORCEMENT (H1, architect ruling 2026-07-17): the floors listed
    # in --enforce-floors below FAIL this job on breach — they are floors the
    # AI already clears, locked against silent regression the moment they were
    # earned. Floors NOT yet listed (the N-track's live targets, e.g. M2/M3/M4
    # during the Wave-2 chase) print as ⚠ advisory in the summary and never
    # red the lane — a hard-red lane on known-open targets just teaches
    # everyone to ignore it.
    # >>> THE RATCHET RULE: when the N-track clears a floor (the sim-runner
    # >>> confirms the canonical median over its threshold), ADD its id to
    # >>> --enforce-floors IN THE SAME COMMIT as that change's golden
    # >>> re-record — each earned floor becomes permanent immediately, and the
    # >>> M2-cities + M3-pop adds complete the full A93 enforcement.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Canonical soak — 7-civ medium no-chaos, M-target floors (RATCHET enforcing; A93/H1)
        run: |
          set +e
          node tools/soak.js --seeds 25 --turns 400 --civs 7 --size medium --no-chaos \
            --enforce-floors M10-buys,M10-treasury,M-resourceCov \
            --stats debugging/sim/nightly-canonical.jsonl 2>&1 | tee /tmp/canonical-soak.log
          rc=${PIPESTATUS[0]}
          {
            echo '### M-target floors — canonical 7-civ medium no-chaos @ t401 (docs/05 §12)'
            echo '```'
            grep -A8 'M-target floors @' /tmp/canonical-soak.log || echo '(no floor block — see the step log)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"
      - name: Upload canonical telemetry + failure artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-canonical
          path: debugging/sim/
          if-no-files-found: ignore

  ui-lane:
    # A49: the multi-client Playwright UI lane (test-ui/) — real two-context
    # live-socket flows that raw CDP could not hold. Its OWN job so
    # `node --test test/` stays playwright-free; the config drives SwiftShader
    # (no GPU on the runner). Failures upload traces + the HTML report.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install the Playwright chromium browser
        run: npx playwright install --with-deps chromium
      - name: Multi-client UI lane (npx playwright test)
        run: npx playwright test
      - name: Upload Playwright traces + report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
